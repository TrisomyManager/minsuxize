<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国民俗3D地图 - 技术原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* 顶部导航栏 */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
            z-index: 100;
            pointer-events: none;
        }

        .header > * {
            pointer-events: auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 10px 20px 10px 40px;
            color: #fff;
            width: 280px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            background: rgba(255,255,255,0.15);
            border-color: #ffd700;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
        }

        /* 底部筛选栏 */
        .filter-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            background: linear-gradient(0deg, rgba(10,10,15,0.95) 0%, transparent 100%);
            z-index: 100;
            pointer-events: none;
        }

        .filter-bar > * {
            pointer-events: auto;
        }

        .filter-groups {
            display: flex;
            gap: 32px;
            justify-content: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-options {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .filter-btn.active {
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border-color: transparent;
            color: #0a0a0f;
            font-weight: 600;
        }

        /* 省份悬浮提示 */
        .province-tooltip {
            position: absolute;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 16px 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
            min-width: 180px;
        }

        .province-tooltip.show {
            opacity: 1;
        }

        .province-tooltip h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .province-tooltip p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin: 4px 0;
        }

        /* 右侧详情面板 */
        .detail-panel {
            position: absolute;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-left: 1px solid rgba(255,215,0,0.2);
            padding: 80px 24px 24px;
            z-index: 150;
            transition: right 0.4s ease;
            overflow-y: auto;
        }

        .detail-panel.show {
            right: 0;
        }

        .panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-close:hover {
            background: rgba(255,107,107,0.3);
            border-color: #ff6b6b;
        }

        .detail-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .detail-title {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .detail-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .detail-tag {
            padding: 4px 12px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            font-size: 0.8rem;
            color: #ffd700;
        }

        .detail-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.85);
            margin-bottom: 24px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section h4 {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-action {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border: none;
            border-radius: 8px;
            color: #0a0a0f;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 24px;
        }

        .detail-action:hover {
            opacity: 0.9;
        }

        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 300;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .loading.hide {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="map-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">🏛️ 中国民俗细则</div>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" placeholder="搜索民俗、地区..." id="search-input">
                </div>
                <button class="icon-btn" title="帮助">❓</button>
                <button class="icon-btn" title="设置">⚙️</button>
            </div>
        </header>

        <!-- 省份悬浮提示 -->
        <div class="province-tooltip" id="tooltip">
            <h3 id="tooltip-name">省份名称</h3>
            <p id="tooltip-count">民俗数量: 0</p>
            <p id="tooltip-hot">热门: -</p>
        </div>

        <!-- 右侧详情面板 -->
        <aside class="detail-panel" id="detail-panel">
            <button class="panel-close" id="panel-close">✕</button>
            <div class="detail-icon" id="detail-icon">🧧</div>
            <h2 class="detail-title" id="detail-title">民俗标题</h2>
            <div class="detail-meta" id="detail-meta">
                <span class="detail-tag">地区</span>
                <span class="detail-tag">节日</span>
            </div>
            <p class="detail-desc" id="detail-desc">描述内容...</p>
            <div class="detail-section">
                <h4>来源</h4>
                <p id="detail-source" style="font-size: 0.9rem; color: rgba(255,255,255,0.6);">-</p>
            </div>
            <a href="#" class="detail-action">查看完整条目 →</a>
        </aside>

        <!-- 底部筛选栏 -->
        <div class="filter-bar">
            <div class="filter-groups">
                <div class="filter-group">
                    <span class="filter-label">地区</span>
                    <div class="filter-options">
                        <button class="filter-btn active" data-filter="region" data-value="all">全部</button>
                        <button class="filter-btn" data-filter="region" data-value="华北">华北</button>
                        <button class="filter-btn" data-filter="region" data-value="东北">东北</button>
                        <button class="filter-btn" data-filter="region" data-value="华东">华东</button>
                        <button class="filter-btn" data-filter="region" data-value="华南">华南</button>
                        <button class="filter-btn" data-filter="region" data-value="西南">西南</button>
                        <button class="filter-btn" data-filter="region" data-value="西北">西北</button>
                    </div>
                </div>
                <div class="filter-group">
                    <span class="filter-label">分类</span>
                    <div class="filter-options">
                        <button class="filter-btn active" data-filter="category" data-value="all">全部</button>
                        <button class="filter-btn" data-filter="category" data-value="节日">🎊 节日</button>
                        <button class="filter-btn" data-filter="category" data-value="表演">🎭 表演</button>
                        <button class="filter-btn" data-filter="category" data-value="手工艺">🎨 手工艺</button>
                        <button class="filter-btn" data-filter="category" data-value="饮食">🍜 饮食</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在加载3D地图...</p>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- 地图数据 -->
    <script src="province-data.js"></script>
    
    <!-- 3D地图核心 -->
    <script src="folk-3d-map.js"></script>

    <script>
        // 民俗数据（模拟从后端获取）
        const folkloreData = [
            {"Title":"春节","Region":"全国","Festival":"春节","Description":"农历正月初一，中国民间最盛大、最热闹的传统节日，又称过年。民间习惯贴剪纸、贴年画、贴春联、贴福字，除夕夜守岁、放爆竹，互相走访拜年。2006年列入第一批国家级非物质文化遗产名录。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"北京地坛庙会","Region":"北京市东城区","Festival":"春节","Description":"地坛春节文化庙会是北京历史最悠久的庙会之一，始于1985年。庙会以地道民俗、传统民间特色闻名，有仿清祭地表演、民间花会、舞狮舞龙等传统活动。","Status":"存续","Source":"中国非物质文化遗产网/地方民俗"},
            {"Title":"天津皇会","Region":"天津市","Festival":"农历三月二十三","Description":"天津皇会是祭祀妈祖的大型民俗活动，又称娘娘会。有仪仗、法鼓、高跷、秧歌等多种民间花会表演，是天津地区最盛大的传统民俗活动。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"河北蔚县打树花","Region":"河北省张家口市蔚县","Festival":"元宵节","Description":"蔚县暖泉镇传统社火活动，将熔化的铁水泼洒在城墙上，迸溅出璀璨火花。源于明代铁匠作坊，有500余年历史，被誉为火树金花不夜天。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"山西寒食节","Region":"山西省介休市","Festival":"清明节","Description":"寒食节在清明节前一二日，禁火冷食，纪念介子推。山西介休是寒食节发源地，当地有禁火、扫墓、荡秋千、蹴鞠等传统习俗。","Status":"存续","Source":"中国非物质文化遗产网/地方民俗"},
            {"Title":"内蒙古那达慕大会","Region":"内蒙古自治区","Festival":"夏季","Description":"蒙古族传统节日，每年七八月间举行，有赛马、摔跤、叼羊等体育活动。那达慕是蒙古语娱乐或游戏的意思，是蒙古族人民展示勇武和技艺的盛会。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"辽宁海城高跷","Region":"辽宁省鞍山市海城市","Festival":"元宵节","Description":"海城高跷是东北地区最具代表性的高跷表演之一，表演者脚踩高跷，扮成各种角色进行表演。技艺高超，动作惊险，是元宵节期间的重要民俗活动。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"吉林朝鲜族农乐舞","Region":"吉林省延边朝鲜族自治州","Festival":"秋季","Description":"朝鲜族传统舞蹈，源于农耕文化，表现农民劳动和丰收的喜悦。舞蹈节奏明快，动作优美，是朝鲜族最具代表性的民间舞蹈。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"上海城隍庙庙会","Region":"上海市黄浦区","Festival":"春节","Description":"上海城隍庙庙会是上海地区著名的传统庙会，以祈福、商贸、娱乐为主要内容。有传统小吃、手工艺品、民间表演等，是老上海民俗文化的集中展示。","Status":"存续","Source":"中国非物质文化遗产网/地方民俗"},
            {"Title":"江苏南京秦淮灯会","Region":"江苏省南京市秦淮区","Festival":"元宵节","Description":"秦淮灯会是南京地区著名的传统民俗活动，始于南朝。以夫子庙、秦淮河为核心，有各式彩灯、民间表演、传统小吃等，被誉为天下第一灯会。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"浙江绍兴黄酒酿制习俗","Region":"浙江省绍兴市","Festival":"立冬","Description":"绍兴黄酒是中国最古老的酒类之一，酿制工艺复杂。立冬是绍兴黄酒开酿的日子，有祭酒神、开酿仪式等传统习俗。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"安徽黄梅戏","Region":"安徽省安庆市","Festival":"其他民俗","Description":"安徽地方戏曲剧种，起源于湖北黄梅，发展于安徽安庆。唱腔淳朴流畅，表演质朴细腻，以《天仙配》《女驸马》等剧目闻名全国。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"福建妈祖祭典","Region":"福建省莆田市湄洲岛","Festival":"农历三月二十三","Description":"福建沿海地区祭祀妈祖的传统典礼，妈祖被视为海上保护神。每年妈祖诞辰日举行盛大祭典，包括迎神、上香、献供、诵经等仪式，是闽南地区重要的民俗活动。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"江西景德镇瓷业习俗","Region":"江西省景德镇市","Festival":"其他民俗","Description":"景德镇千年瓷都的传统行业习俗，包括瓷业祭祀、行规行约、技艺传承等。瓷工们在特定节日祭拜窑神，祈求烧制顺利，是独特的工业民俗文化遗产。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"山东潍坊风筝","Region":"山东省潍坊市","Festival":"清明节","Description":"潍坊是中国风筝之都，清明时节放风筝是当地传统习俗。潍坊风筝以竹为骨、绢为面，造型多样，每年举办国际风筝节。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"河南豫剧","Region":"河南省","Festival":"其他民俗","Description":"河南地方戏曲剧种，是中国五大戏曲剧种之一。豫剧唱腔高亢激昂，表演大气磅礴，有东方咏叹调之称，流行于河南及周边省份。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"湖北恩施摆手舞","Region":"湖北省恩施土家族苗族自治州","Festival":"其他民俗","Description":"土家族传统舞蹈，摆手是土家语跳舞的意思。摆手舞动作古朴粗犷，多在祭祀祖先、庆祝丰收时跳，是土家族文化的重要组成部分。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"湖南汨罗江龙舟习俗","Region":"湖南省岳阳市汨罗市","Festival":"端午节","Description":"汨罗江是屈原投江的地方，当地端午节龙舟竞渡习俗历史悠久。龙舟赛前要举行祭龙仪式，船员们喝雄黄酒、系五彩丝，表达对屈原的纪念。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"广东舞狮","Region":"广东省","Festival":"春节","Description":"广东地区春节期间的传统表演艺术，舞狮者装扮成狮子，随着锣鼓声起舞，寓意驱邪避灾、招财进宝。有南狮、北狮之分，广东以醒狮最为著名。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"广西壮族三月三","Region":"广西壮族自治区","Festival":"农历三月初三","Description":"农历三月初三是壮族传统节日，又称歌圩节。青年男女对唱山歌、抛绣球、碰彩蛋，是壮族青年社交和择偶的重要场合，也是壮族文化的集中展示。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"海南黎族三月三","Region":"海南省","Festival":"农历三月初三","Description":"黎族传统节日，黎语称孚念孚。男女青年会聚在山坡上对唱民歌、跳竹竿舞、寻找意中人。是黎族人民悼念祖先、喜庆新生、赞美生活的传统节日。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"重庆铜梁龙舞","Region":"重庆市铜梁区","Festival":"元宵节","Description":"铜梁龙舞是重庆地区著名的传统舞蹈，以大龙、火龙最为著名。龙身长达数十米，需要数十人共同舞动，气势磅礴，被誉为中华第一龙。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"四川变脸","Region":"四川省","Festival":"其他民俗","Description":"川剧表演的特技之一，演员在瞬间变换脸谱，展现人物内心情绪变化。是四川地区独特的传统表演艺术，也是中国传统戏曲文化的瑰宝。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"贵州苗族姊妹节","Region":"贵州省黔东南苗族侗族自治州台江县","Festival":"农历三月十五","Description":"台江县苗族传统节日，被称为最古老的东方情人节。姑娘们会穿上盛装、戴上银饰，与小伙子们对歌、游方、吃姊妹饭，是苗族青年恋爱社交的节日。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"云南傣族泼水节","Region":"云南省西双版纳傣族自治州","Festival":"公历4月中旬","Description":"傣族传统节日，也是傣族新年。人们用清水相互泼洒，祈求洗去过去一年的不顺，迎接新的一年。是傣族最盛大的节日。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"西藏雪顿节","Region":"西藏自治区拉萨市","Festival":"藏历六月三十","Description":"藏族传统节日，又称酸奶节。有展佛、藏戏表演、过林卡等活动。最初是僧人结束夏安居后吃酸奶的节日，后来发展成为综合性民俗节日。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"陕西秦腔","Region":"陕西省","Festival":"其他民俗","Description":"中国古老的戏剧之一，起源于陕西、甘肃一带，唱腔高亢激越，表演粗犷豪放。是西北地区重要的传统艺术形式，被誉为黄土高原的摇滚。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"甘肃兰州太平鼓","Region":"甘肃省兰州市","Festival":"春节","Description":"兰州地区春节传统表演艺术，是一种带有浓郁西北风情的汉族民俗舞蹈。表演者手持太平鼓，边击边舞，寓意天下太平、五谷丰登。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"青海塔尔寺酥油花","Region":"青海省西宁市湟中区","Festival":"元宵节","Description":"塔尔寺传统宗教艺术，用酥油捏制各种佛像、花卉、建筑等造型。酥油花色彩艳丽，造型精美，每年正月十五在塔尔寺展出，吸引众多信众和游客。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"宁夏回族花儿","Region":"宁夏回族自治区","Festival":"其他民俗","Description":"回族传统民歌形式，花儿又称少年。曲调高亢悠扬，歌词多表达爱情和生活中的情感，在西北地区广泛流传，被誉为西北之魂。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"},
            {"Title":"新疆维吾尔族麦西热甫","Region":"新疆维吾尔自治区","Festival":"其他民俗","Description":"维吾尔族传统歌舞聚会形式，有歌舞、游戏、诗词朗诵等活动。是维吾尔族人民社交娱乐、传承文化的重要方式。","Status":"存续","Source":"中国非物质文化遗产网/国家级非遗名录"}
        ];

        // 初始化3D地图
        let map3d;

        window.addEventListener('load', () => {
            // 延迟加载确保资源就绪
            setTimeout(() => {
                map3d = new Folk3DMap('map-container');
                
                // 加载民俗数据
                map3d.loadFolkloreData(folkloreData);
                
                // 设置回调
                map3d.onProvinceHover = (data) => {
                    const tooltip = document.getElementById('tooltip');
                    const provinceData = getProvinceFolklore(data.name);
                    
                    document.getElementById('tooltip-name').textContent = data.name;
                    document.getElementById('tooltip-count').textContent = `民俗数量: ${provinceData.count}`;
                    document.getElementById('tooltip-hot').textContent = provinceData.hot ? `热门: ${provinceData.hot}` : '热门: -';
                    
                    tooltip.classList.add('show');
                    
                    // 更新位置
                    document.addEventListener('mousemove', updateTooltipPosition);
                };
                
                map3d.onProvinceLeave = () => {
                    document.getElementById('tooltip').classList.remove('show');
                    document.removeEventListener('mousemove', updateTooltipPosition);
                };
                
                map3d.onTagClick = (item) => {
                    showDetailPanel(item);
                };

                // 隐藏加载动画
                document.getElementById('loading').classList.add('hide');
            }, 500);
        });

        // 更新提示框位置
        function updateTooltipPosition(e) {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.left = (e.clientX + 20) + 'px';
            tooltip.style.top = (e.clientY - 20) + 'px';
        }

        // 获取省份民俗统计
        function getProvinceFolklore(provinceName) {
            const items = folkloreData.filter(item => {
                const mapped = REGION_MAPPING[item.Region] || item.Region;
                return mapped === provinceName;
            });
            
            return {
                count: items.length,
                hot: items[0]?.Title || null
            };
        }

        // 显示详情面板
        function showDetailPanel(item) {
            const panel = document.getElementById('detail-panel');
            
            document.getElementById('detail-icon').textContent = getFolkloreIcon(item.Festival);
            document.getElementById('detail-title').textContent = item.Title;
            document.getElementById('detail-desc').textContent = item.Description;
            document.getElementById('detail-source').textContent = item.Source;
            
            const metaContainer = document.getElementById('detail-meta');
            metaContainer.innerHTML = `
                <span class="detail-tag">${item.Region}</span>
                <span class="detail-tag">${item.Festival}</span>
                <span class="detail-tag">${item.Status}</span>
            `;
            
            panel.classList.add('show');
        }

        // 关闭详情面板
        document.getElementById('panel-close').addEventListener('click', () => {
            document.getElementById('detail-panel').classList.remove('show');
        });

        // 筛选按钮事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                const value = btn.dataset.value;
                
                // 更新按钮状态
                document.querySelectorAll(`.filter-btn[data-filter="${filter}"]`).forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                
                // 应用筛选
                if (map3d) {
                    map3d.filterTags(
                        filter === 'category' ? value : null,
                        filter === 'region' ? value : null
                    );
                }
            });
        });

        // 搜索功能
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            if (map3d && keyword) {
                // 简单的搜索高亮逻辑
                const matched = folkloreData.filter(item => 
                    item.Title.toLowerCase().includes(keyword) ||
                    item.Region.toLowerCase().includes(keyword)
                );
                console.log('搜索结果:', matched);
            }
        });
    </script>
</body>
